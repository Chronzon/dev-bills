name: dev-bills

x-app-env: &app-env
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in environment variables}
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"

x-app-base: &app-base
  image: ${APP_IMAGE:-dev-bills-app}
  build:
    context: .
  environment:
    <<: *app-env

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in environment variables}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in environment variables}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in environment variables}
    volumes:
      - dev-bills-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    <<: *app-base
    restart: "no"
    command: npm run db:migrate:deploy
    depends_on:
      postgres:
        condition: service_healthy

  app:
    <<: *app-base
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  dev-bills-postgres:
