name: dev-bills-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: devbills
      POSTGRES_USER: devbills
      POSTGRES_PASSWORD: devbills
    ports:
      - "5432:5432"
    volumes:
      - dev-bills-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: dev-bills-dev-app
    build:
      context: .
      target: deps
    command: sh -c "npm run db:migrate:deploy && npm run dev -- --hostname 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://devbills:devbills@postgres:5432/devbills
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - dev-bills-dev-node-modules:/app/node_modules
      - dev-bills-dev-next:/app/.next
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dev-bills-dev-postgres:
  dev-bills-dev-node-modules:
  dev-bills-dev-next:
